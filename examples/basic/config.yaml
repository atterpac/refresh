# Equivalent of main.go expressed as a config file.
# Load it with engine.NewEngineFromYAML("config.yaml").
# Note the top-level `config:` key, which NewEngineFromYAML expects.
config:
  root_path: "."
  log_level: "debug"
  debounce: 500

  ignore:
    dir: [".git", "node_modules", "vendor", "bin"]
    file: [".gitignore", ".DS_Store"]
    watched_extension: ["*.go"]
    git: true

  # Executes run in order. type is one of: background | once | blocking | primary
  executes:
    - cmd: "go build -o ./bin/app ./app"
      type: "blocking"

    - cmd: "./bin/app"
      type: "primary"
