name: Refresh Build

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -race ./...

  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Build application
      run: go build ./cmd/refresh/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: refresh-${{ matrix.os }}
        path: ./refresh*
